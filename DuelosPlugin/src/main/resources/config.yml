duelos:
  # Tiempo de loot tras ganar (segundos)
  loot-time: 90
  # Delay entre countdown ticks (ticks de Minecraft, 20 = 1 segundo)
  countdown-ticks: 20
  # ELO inicial de nuevos jugadores
  elo-inicial: 1000
  # Constante K para cálculo ELO
  elo-k: 32
  # Mundo de duelos (donde están las arenas)
  mundo-duelos: "duels"
  # Spawn de regreso al salir de duelo
  spawn-regreso:
    world: "Lobby"
    x: 0.5
    y: 67.0
    z: -59.5
    yaw: 0.0
    pitch: 0.0

  # Modos de juego
  modos:
    normal:
      nombre: "§c§lNORMAL"
      descripcion: "Modo sin restricciones. Todos los ítems permitidos."
      material: END_CRYSTAL
      multiplicador-elo: 1.0
      items-bloqueados: []
    nocristmaza:
      nombre: "§5§lNO CRYSTAL/MACE"
      descripcion: "Cristal del End, Maza y Tótem deshabilitados."
      material: NETHERITE_SWORD
      multiplicador-elo: 1.5
      items-bloqueados:
        - END_CRYSTAL
        - MACE
        - TOTEM_OF_UNDYING

  # Penalización / bonificación de inventario
  keepinv:
    penalizacion: 0.70   # 70% del ELO normal si keepinv ON
    bonificacion: 2.0    # x2 ELO si keepinv OFF

  # Comandos bloqueados durante duelo
  comandos-bloqueados:
    - "tpa"
    - "tpahere"
    - "tpaccept"
    - "spawn"
    - "afk"
    - "home"
    - "homes"
    - "warp"
    - "warps"
    - "back"
    - "fly"
    - "rtp"
    - "enderchest"
    - "ec"

  # Rangos ELO
  rangos:
    inmortal:
      nombre: "§4§l☠ INMORTAL"
      elo-min: 4000
      color: "§4"
    diamante:
      nombre: "§b§l◆ DIAMANTE"
      elo-min: 3200
      color: "§b"
    oro:
      nombre: "§e§l✦ ORO"
      elo-min: 2500
      color: "§e"
    plata:
      nombre: "§f§l▲ PLATA"
      elo-min: 1800
      color: "§f"
    bronce:
      nombre: "§6§l● BRONCE"
      elo-min: 1200
      color: "§6"
    novato:
      nombre: "§7§l○ NOVATO"
      elo-min: 0
      color: "§7"
